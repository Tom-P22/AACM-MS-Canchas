server:
  port: 8083

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bd_municipalidad_canchas}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

flyway:
  enabled: false

jwt:
  secret: ClaveUltraSecretaEInviolableParaLaMunicipalidad2026!
  issuer: ms-auth

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /api/v1/canchas/doc/swagger-ui/index.html
    config-url: /api/v1/canchas/doc/api-docs/swagger-config
    url: /api/v1/canchas/doc/api-docs
  api-docs:
    path: /api/v1/canchas/doc/api-docs
  use-management-port: false