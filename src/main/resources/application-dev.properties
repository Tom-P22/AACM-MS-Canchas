server.port=8083

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3313/bd_canchas}
spring.datasource.username=${DB_USER:user_dev}
spring.datasource.password=${DB_PASSWORD:dev_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

spring.flyway.enabled=false

# Ejecutar datos iniciales usando SQL estándar
spring.sql.init.mode=always

jwt.secret=ClaveUltraSecretaEInviolableParaLaMunicipalidad2026!
jwt.issuer=ms-auth

# Conexion a Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true